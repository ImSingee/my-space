# Hatch — one-command deploy: `docker compose up -d`
# Brings up Postgres + the platform (control plane) + the Agent Runner
# (execution plane). The platform image bundles Node, Deno, git, buf and
# esbuild; the same image runs the Agent Runner with a different command.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      # Passwordless local access (the platform connects as postgres@db without a
      # password and provisions a database per app). This DB is not published
      # to the host by default; uncomment the ports mapping below to inspect it.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
    #   - "5544:5432" # optional: expose for debugging (avoid clashing with a local PG)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    image: ${HATCH_IMAGE:-ghcr.io/imsingee/my-space:master}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Platform database.
      DATABASE_URL: postgres://postgres@db:5432/postgres
      # Admin connection used to create/drop a database per app. Each app's
      # DATABASE_URL (host, port, credentials) is derived from this URL.
      APP_DATABASE_URL: postgres://postgres@db:5432/postgres
      # Image defaults; uncomment to override.
      # PORT: '3700'
      # HOST: 0.0.0.0
      # AGENT_INTERNAL_HOST: 0.0.0.0
      # AGENT_INTERNAL_PORT: '3701'
      # REQUIRED: shared secret the Agent Runner authenticates with (no
      # default on purpose — a guessable token would let any process that can
      # reach 3701, including generated app backends, impersonate the runner).
      # Generate one with e.g. `openssl rand -hex 32` and put it in `.env`.
      AGENT_RUNNER_TOKEN: ${AGENT_RUNNER_TOKEN:?set AGENT_RUNNER_TOKEN in .env (e.g. openssl rand -hex 32)}
      # CHANGE THIS in production: signs auth sessions.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-please-change-this-to-a-long-random-string}
      # Self-service sign-up. Open on first run so you can create the owner
      # account; set HATCH_ALLOW_SIGNUP=false and redeploy once it exists to lock
      # registration on this single-tenant instance.
      HATCH_ALLOW_SIGNUP: ${HATCH_ALLOW_SIGNUP:-true}
    ports:
      # Host port is configurable (HATCH_PORT) to avoid clashing with a local dev server.
      - '${HATCH_PORT:-3700}:3700'
    volumes:
      # Persist agent-authored app source, builds, versions and storage.
      - platform_workspace:/app/workspace
      # Persist dependency/tool caches, including Deno's npm cache.
      - platform_cache:/cache

  # The Agent Runner: executes LLM turns and the agent's shell/file sandbox in
  # its own container. It only opens OUTBOUND connections to the platform's
  # internal server (3701) — it has no database credentials, no auth secrets,
  # and no access to the platform's workspace volume. Inside the container the
  # runner demotes every agent-controlled subprocess (run_command shell,
  # worktree git) to the unprivileged `hatch-sandbox` user via setpriv, so
  # model-run commands cannot read AGENT_RUNNER_TOKEN from the runner
  # process's /proc environment.
  agent:
    image: ${HATCH_IMAGE:-ghcr.io/imsingee/my-space:master}
    pull_policy: always
    restart: unless-stopped
    command: ['node', 'dist/runner/main.mjs']
    depends_on:
      - app
    environment:
      HATCH_PLATFORM_URL: http://app:3701
      HATCH_RUNNER_ID: runner-1
      # Must match the platform's AGENT_RUNNER_TOKEN above.
      AGENT_RUNNER_TOKEN: ${AGENT_RUNNER_TOKEN:?set AGENT_RUNNER_TOKEN in .env (e.g. openssl rand -hex 32)}
      # Runner-local worktrees + sandbox HOME (separate volume from the
      # platform's workspace on purpose).
      HATCH_DATA_DIR: /app/workspace
    volumes:
      - agent_workspace:/app/workspace
      - agent_cache:/cache

volumes:
  pgdata:
  platform_workspace:
  platform_cache:
  agent_workspace:
  agent_cache:
