syntax = "proto3";

package app.v1;

// Request/response messages for the default counter service.
message GetCountRequest {}

message IncrementRequest {
  int32 amount = 1;
}

message CountReply {
  int32 count = 1;
}

// A tiny persistent counter. Replace these methods with whatever your app
// needs — the platform regenerates the Connect client + server stubs on deploy.
service CounterService {
  rpc GetCount(GetCountRequest) returns (CountReply);
  rpc Increment(IncrementRequest) returns (CountReply);
}
