<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__SUBAPP_NAME__</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #18181b;
        --muted: #71717a;
        --border: #e4e4e7;
        --accent: #7c3aed;
        --card: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0c0e;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --border: #27272a;
          --card: #161618;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      .app {
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      nav {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }
      nav a:hover {
        color: var(--fg);
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        background: var(--card);
        text-align: center;
      }
      .count {
        font-size: 64px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
      }
      button {
        margin-top: 18px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-size: 15px;
        font-weight: 600;
        padding: 10px 20px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
